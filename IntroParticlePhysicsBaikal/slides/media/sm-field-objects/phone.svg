<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Cell phone">
  <defs>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2e4f"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86f7ff"/>
      <stop offset="45%" stop-color="#2b8cff"/>
      <stop offset="100%" stop-color="#7f5cff"/>
    </linearGradient>
    <filter id="phoneGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" fill="none"/>
  <rect x="36" y="13" width="56" height="102" rx="12" fill="url(#phoneBody)" stroke="#bdeaff" stroke-width="4" filter="url(#phoneGlow)"/>
  <rect x="43" y="25" width="42" height="76" rx="5" fill="url(#phoneScreen)" opacity="0.84"/>
  <path d="M50 39h28M50 52h28M50 65h21M50 78h26" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <circle cx="64" cy="108" r="3.5" fill="#d9f7ff"/>
</svg>
