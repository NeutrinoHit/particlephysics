<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="Animated particle detector event">
  <defs>
    <radialGradient id="vertexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff6b8" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#ffd14a" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="detectorBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc9ff" stop-opacity="0.04"/>
      <stop offset="0.5" stop-color="#8bd8ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4cc9ff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wire { fill: none; stroke: #7fd6ff; stroke-width: 1.1; stroke-opacity: 0.34; }
      .wire-soft { fill: url(#detectorBlue); stroke: #8ddeff; stroke-width: 1.6; stroke-opacity: 0.55; }
      .track { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 420; stroke-dashoffset: 420; animation: drawTrack 6.2s ease-in-out infinite; }
      .hit { opacity: 0; animation: blinkHit 6.2s ease-in-out infinite; }
      .beam-guide { stroke-dasharray: 9 13; }
      .incoming { animation: incomingFlash 6.2s ease-in-out infinite; }
      .event-afterglow { opacity: 0; animation: afterglow 6.2s ease-in-out infinite; }
      @keyframes drawTrack {
        0%, 29% { stroke-dashoffset: 420; opacity: 0; }
        34% { opacity: 1; }
        62% { stroke-dashoffset: 0; opacity: 1; }
        82% { stroke-dashoffset: 0; opacity: 0.72; }
        100% { stroke-dashoffset: 420; opacity: 0; }
      }
      @keyframes blinkHit {
        0%, 40% { opacity: 0; }
        50%, 72% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes incomingFlash {
        0%, 30% { opacity: 1; }
        35%, 100% { opacity: 0; }
      }
      @keyframes afterglow {
        0%, 32% { opacity: 0; }
        44%, 82% { opacity: 0.2; }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="760" height="360" rx="18" fill="#020509"/>

  <g opacity="0.92">
    <path class="wire-soft" d="M154 64 C222 32 543 28 628 72 C690 104 692 257 626 290 C530 336 223 326 151 291 C94 263 96 92 154 64 Z"/>
    <ellipse class="wire" cx="152" cy="178" rx="70" ry="116"/>
    <ellipse class="wire" cx="628" cy="180" rx="72" ry="112"/>
    <path class="wire" d="M152 62 C270 24 512 30 628 69"/>
    <path class="wire" d="M152 294 C270 331 512 325 628 292"/>
    <path class="wire" d="M151 90 C268 66 515 70 628 96"/>
    <path class="wire" d="M151 266 C268 292 515 288 628 264"/>
    <path class="wire" d="M151 120 C267 104 516 106 629 124"/>
    <path class="wire" d="M151 236 C267 252 516 250 629 236"/>
    <path class="wire" d="M151 150 C267 143 516 143 629 151"/>
    <path class="wire" d="M151 207 C267 216 516 216 629 208"/>
    <path class="wire" d="M151 178 C267 178 516 178 629 180"/>
    <g opacity="0.55">
      <ellipse class="wire" cx="230" cy="178" rx="58" ry="104"/>
      <ellipse class="wire" cx="306" cy="178" rx="58" ry="102"/>
      <ellipse class="wire" cx="382" cy="178" rx="58" ry="102"/>
      <ellipse class="wire" cx="458" cy="178" rx="58" ry="102"/>
      <ellipse class="wire" cx="534" cy="178" rx="58" ry="104"/>
    </g>
  </g>

  <g opacity="0.78">
    <path class="beam-guide" d="M42 178 L348 178" stroke="#ffcc37" stroke-width="1.5" stroke-opacity="0.38"/>
    <path class="beam-guide" d="M718 178 L412 178" stroke="#52d6ff" stroke-width="1.5" stroke-opacity="0.38"/>
    <path class="beam-guide" d="M42 183 L348 180" stroke="#52d6ff" stroke-width="0.9" stroke-opacity="0.22"/>
    <path class="beam-guide" d="M718 173 L412 176" stroke="#ffcc37" stroke-width="0.9" stroke-opacity="0.22"/>
  </g>

  <g class="incoming" filter="url(#softGlow)">
    <circle r="5.5" fill="#ffcc37">
      <animate attributeName="cx" values="58;380;380;58" keyTimes="0;0.31;0.36;1" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="178;178;178;178" dur="6.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="5.5" fill="#72d6ff">
      <animate attributeName="cx" values="702;380;380;702" keyTimes="0;0.31;0.36;1" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="178;178;178;178" dur="6.2s" repeatCount="indefinite"/>
    </circle>
    <path d="M80 178 L148 178" stroke="#ffcc37" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="7 8" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0 0;276 0;276 0;0 0" keyTimes="0;0.31;0.36;1" dur="6.2s" repeatCount="indefinite"/>
    </path>
    <path d="M680 178 L612 178" stroke="#72d6ff" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="7 8" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0 0;-276 0;-276 0;0 0" keyTimes="0;0.31;0.36;1" dur="6.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="380" cy="178" r="18" fill="url(#vertexGlow)" opacity="0.2">
      <animate attributeName="r" values="8;8;45;22;14;8" keyTimes="0;0.28;0.33;0.42;0.78;1" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.12;1;0.45;0.2;0.12" keyTimes="0;0.28;0.33;0.42;0.78;1" dur="6.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="178" r="5" fill="#fff4b0"/>
    <g class="event-afterglow">
      <path d="M380 178 C326 144 277 111 183 100" stroke="#ffc23b" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C318 186 249 207 141 236" stroke="#ffb000" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C431 128 472 79 506 10" stroke="#19dc48" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C444 188 505 218 650 235" stroke="#75d9ff" stroke-width="1.7" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C442 151 505 122 682 105" stroke="#ffc23b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C337 224 302 266 230 320" stroke="#ffc23b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C405 236 436 286 496 337" stroke="#20d65a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M380 178 C342 128 323 82 308 43" stroke="#72d6ff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </g>
    <path class="track track1" d="M380 178 C326 144 277 111 183 100" stroke="#ffc23b" stroke-width="3"/>
    <path class="track track2" d="M380 178 C318 186 249 207 141 236" stroke="#ffb000" stroke-width="2.8"/>
    <path class="track track3" d="M380 178 C431 128 472 79 506 10" stroke="#19dc48" stroke-width="4.5"/>
    <path class="track track4" d="M380 178 C444 188 505 218 650 235" stroke="#75d9ff" stroke-width="2.8"/>
    <path class="track track5" d="M380 178 C442 151 505 122 682 105" stroke="#ffc23b" stroke-width="2.4"/>
    <path class="track track2" d="M380 178 C337 224 302 266 230 320" stroke="#ffc23b" stroke-width="2.4"/>
    <path class="track track3" d="M380 178 C405 236 436 286 496 337" stroke="#20d65a" stroke-width="3.5"/>
    <path class="track track4" d="M380 178 C342 128 323 82 308 43" stroke="#72d6ff" stroke-width="2.1"/>
  </g>

  <g filter="url(#softGlow)">
    <circle class="hit hit1" cx="184" cy="100" r="5" fill="#ffc23b"/>
    <rect class="hit hit2" x="122" y="229" width="28" height="12" rx="2" fill="#ff9e00" transform="rotate(-14 136 235)"/>
    <rect class="hit hit3" x="500" y="6" width="14" height="36" rx="3" fill="#19dc48" transform="rotate(15 507 24)"/>
    <circle class="hit hit4" cx="648" cy="235" r="5" fill="#75d9ff"/>
    <rect class="hit hit2" x="660" y="98" width="28" height="9" rx="2" fill="#79d7ff" transform="rotate(-5 674 103)"/>
    <rect class="hit hit3" x="219" y="313" width="25" height="10" rx="2" fill="#ffc23b" transform="rotate(-35 231 318)"/>
    <rect class="hit hit4" x="486" y="329" width="32" height="11" rx="2" fill="#20d65a" transform="rotate(37 502 334)"/>
    <circle class="hit hit2" cx="308" cy="43" r="4" fill="#72d6ff"/>
  </g>

  <g opacity="0.78">
    <text x="24" y="34" fill="#f2f2f2" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Experiment</text>
    <text x="24" y="60" fill="#c5d8e8" font-family="Inter, Arial, sans-serif" font-size="15">tracks and energy deposits</text>
  </g>
</svg>
