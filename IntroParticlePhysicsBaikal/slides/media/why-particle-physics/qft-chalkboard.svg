<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-label="Chalkboard with quantum field theory equations">
  <defs>
    <linearGradient id="boardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123326"/>
      <stop offset="0.52" stop-color="#071b15"/>
      <stop offset="1" stop-color="#102c24"/>
    </linearGradient>
    <filter id="chalkBlur" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
    </filter>
    <style>
      .chalk { font-family: "Times New Roman", STIXGeneral, serif; fill: #f4f4e8; filter: url(#chalkBlur); }
      .chalk-blue { fill: #a8d9ff; }
      .chalk-yellow { fill: #ffd575; }
      .chalk-pink { fill: #ff9ccc; }
      .small { font-size: 25px; }
      .medium { font-size: 28px; }
      .large { font-size: 32px; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 700; }
    </style>
  </defs>

  <rect width="760" height="300" rx="18" fill="#090604"/>
  <rect x="22" y="20" width="716" height="252" rx="12" fill="#5a351d"/>
  <rect x="34" y="32" width="692" height="228" rx="8" fill="url(#boardFill)" stroke="#d4a05a" stroke-width="3"/>
  <path d="M57 245 C184 219 304 265 438 233 C541 208 630 226 702 207" fill="none" stroke="#d7eee6" stroke-opacity="0.08" stroke-width="10"/>
  <path d="M47 80 C164 61 279 88 393 69 C511 50 616 65 710 47" fill="none" stroke="#d7eee6" stroke-opacity="0.06" stroke-width="9"/>

  <text x="61" y="68" class="chalk label chalk-yellow">Theory</text>
  <text x="61" y="113" class="chalk medium">Fields: &#966;(x), &#968;(x), A<tspan baseline-shift="sub" font-size="20">&#956;</tspan>(x)</text>
  <text x="61" y="158" class="chalk small chalk-blue">(&#9633; + m<tspan baseline-shift="super" font-size="17">2</tspan>)&#966; = 0</text>
  <text x="61" y="200" class="chalk small">[&#966;(t,x), &#960;(t,y)] = i&#948;<tspan baseline-shift="super" font-size="17">3</tspan>(x-y)</text>
  <text x="61" y="239" class="chalk small chalk-yellow">Z = &#8747; D&#966; exp(iS[&#966;])</text>

  <text x="372" y="80" class="chalk large">L<tspan baseline-shift="sub" font-size="19">scalar</tspan> = <tspan font-size="24">1</tspan>/<tspan font-size="24">2</tspan>(&#8706;&#966;)<tspan baseline-shift="super" font-size="18">2</tspan> - <tspan font-size="24">1</tspan>/<tspan font-size="24">2</tspan>m<tspan baseline-shift="super" font-size="18">2</tspan>&#966;<tspan baseline-shift="super" font-size="18">2</tspan></text>
  <text x="372" y="132" class="chalk medium chalk-pink">L<tspan baseline-shift="sub" font-size="17">Dirac</tspan> = &#968;&#772;(i&#947;<tspan baseline-shift="super" font-size="16">&#956;</tspan>D<tspan baseline-shift="sub" font-size="16">&#956;</tspan> - m)&#968;</text>
  <text x="372" y="180" class="chalk medium">L<tspan baseline-shift="sub" font-size="17">gauge</tspan> = - <tspan font-size="21">1</tspan>/<tspan font-size="21">4</tspan> F<tspan baseline-shift="sub" font-size="16">&#956;&#957;</tspan>F<tspan baseline-shift="super" font-size="16">&#956;&#957;</tspan></text>
  <text x="372" y="225" class="chalk medium chalk-blue">symmetry &#8594; vertices &#8594; events</text>

  <rect x="575" y="251" width="76" height="8" rx="4" fill="#f1f1df" opacity="0.82"/>
  <rect x="660" y="251" width="38" height="8" rx="4" fill="#ffd575" opacity="0.9"/>
</svg>
