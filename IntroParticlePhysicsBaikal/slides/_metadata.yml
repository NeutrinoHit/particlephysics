lang: en

format:
  revealjs:
    theme: [black, ../assets/css/custom.scss]
    logo: ../../shared/reveal/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      - text: |
          <script data-external="1" data-context-home="../index.html" data-context-home-label="Mini-course" src="../../shared/reveal/neutrinohit-reveal-footer.js"></script>
      - ../../analytics/cloudflare-web-analytics.html
    footer: "Introduction to Particle Physics · Mini-course · D. Naumov"
    embed-resources: false
    slide-number: true
    slide-level: 2
    toc: true
    toc-depth: 1
    toc-title: "Lecture map"
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: false
    preview-links: false
    code-line-numbers: false
    code-copy: true

execute:
  echo: false
  warning: false
  message: false
