lang: en

format:
  revealjs:
    theme: [black, ../../shared/styles/neutrinohit-reveal.scss, ../assets/css/custom.scss]
    css:
      - ../../shared/reveal/neutrinohit-reveal-quiz.css
    logo: ../assets/logos/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      - text: |
          <script data-external="1" data-context-home="https://neutrinohit.github.io/particlephysics/IntroParticlePhysicsBaikal/" data-context-home-label="Mini-course home" src="../../shared/reveal/neutrinohit-reveal-footer.js"></script>
          <script data-external="1" src="../../shared/reveal/neutrinohit-timed-captions.js"></script>
      - ../../analytics/cloudflare-web-analytics.html
    embed-resources: false
    slide-number: true
    slide-level: 2
    toc: false
    toc-depth: 1
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: false
    preview-links: false
    code-line-numbers: false
    code-copy: true

execute:
  echo: false
  warning: false
  message: false
