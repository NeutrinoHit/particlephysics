project:
  type: website
  output-dir: outputs
  resources:
    - "assets/**"
    - "requirements.txt"
    - "environment.yml"
    - "references.bib"
  render:
    - "index.qmd"
    - "slides/*.qmd"

lang: en
bibliography: references.bib

website:
  title: "Introduction to Particle Physics"
  navbar:
    left:
      - href: index.qmd
        text: Course
      - href: slides/01_particles_fields_interactions.qmd
        text: Lecture 1
      - href: slides/02_standard_model.qmd
        text: Lecture 2

format:
  revealjs:
    theme: [black, ../shared/styles/neutrinohit-reveal.scss, assets/css/custom.scss]
    css:
      - ../shared/reveal/neutrinohit-reveal-quiz.css
    logo: assets/logos/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      text: |
        <script data-external="1" data-context-home="https://neutrinohit.github.io/particlephysics/IntroParticlePhysicsBaikal/" data-context-home-label="Mini-course home" src="../assets/reveal/neutrinohit-reveal-footer.js"></script>
        <script data-external="1" src="../assets/reveal/neutrinohit-timed-captions.js"></script>
    embed-resources: true
    slide-number: true
    slide-level: 2
    toc: false
    toc-depth: 1
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: false
    preview-links: false
    code-line-numbers: false
    code-copy: true

execute:
  echo: false
  warning: false
  message: false
