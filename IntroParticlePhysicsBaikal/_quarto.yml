project:
  type: website
  output-dir: outputs
  resources:
    - "assets/**"
    - "notebooks/**"
    - "README.md"
    - "requirements.txt"
    - "environment.yml"
    - "references.bib"
  render:
    - "index.qmd"
    - "slides/*.qmd"
    - "handouts/*.qmd"

lang: en
bibliography: references.bib

website:
  title: "Introduction to Particle Physics"
  navbar:
    left:
      - href: index.qmd
        text: Course
      - href: slides/01_particles_fields_interactions.qmd
        text: Lecture 1
      - href: slides/02_standard_model_neutrinos.qmd
        text: Lecture 2

format:
  revealjs:
    theme: [black, assets/css/custom.scss]
    logo: assets/logos/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      text: |
        <script data-external="1" data-context-home="../index.html" data-context-home-label="Particle Physics" src="../assets/reveal/neutrinohit-reveal-footer.js"></script>
    footer: "Introduction to Particle Physics · Baikal School · D. Naumov"
    embed-resources: true
    slide-number: true
    slide-level: 2
    toc: true
    toc-depth: 1
    toc-title: "Lecture map"
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: false
    preview-links: false
    code-line-numbers: false
    code-copy: true

execute:
  echo: false
  warning: false
  message: false
